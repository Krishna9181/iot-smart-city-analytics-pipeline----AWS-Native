AWSTemplateFormatVersion: '2010-09-09'
Description: 'Smart City Lambda Functions'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  
  DataLakeBucket:
    Type: String

Resources:
  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'smart-city-lambda-role-${Environment}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SmartCityLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::${DataLakeBucket}'
                  - !Sub 'arn:aws:s3:::${DataLakeBucket}/*'
              - Effect: Allow
                Action:
                  - sns:Publish
                  - ses:SendEmail
                Resource: '*'
              - Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                Resource: '*'

  # Data Validation Lambda
  DataValidationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'smart-city-data-validation-${Environment}'
      Runtime: python3.9
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          DATA_LAKE_BUCKET: !Ref DataLakeBucket
      Code:
        ZipFile: |
          import json
          import boto3
          import logging
          from datetime import datetime
          
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          
          def lambda_handler(event, context):
              """
              Validate incoming IoT sensor data
              """
              try:
                  # Parse Kinesis records
                  for record in event['Records']:
                      # Decode base64 data
                      payload = json.loads(
                          base64.b64decode(record['kinesis']['data']).decode('utf-8')
                      )
                      
                      # Validate required fields
                      required_fields = ['sensor_id', 'sensor_type', 'event_time', 'location', 'measurements']
                      
                      for field in required_fields:
                          if field not in payload:
                              logger.error(f"Missing required field: {field}")
                              continue
                      
                      # Validate sensor types
                      valid_sensor_types = ['air_quality', 'traffic']
                      if payload['sensor_type'] not in valid_sensor_types:
                          logger.error(f"Invalid sensor type: {payload['sensor_type']}")
                          continue
                      
                      # Validate measurements based on sensor type
                      if payload['sensor_type'] == 'air_quality':
                          validate_air_quality(payload['measurements'])
                      elif payload['sensor_type'] == 'traffic':
                          validate_traffic(payload['measurements'])
                      
                      logger.info(f"Validated record for sensor: {payload['sensor_id']}")
                  
                  return {
                      'statusCode': 200,
                      'body': json.dumps('Data validation completed')
                  }
                  
              except Exception as e:
                  logger.error(f"Error validating data: {str(e)}")
                  raise e
          
          def validate_air_quality(measurements):
              """Validate air quality measurements"""
              if 'pm25' in measurements and measurements['pm25'] < 0:
                  raise ValueError("PM2.5 cannot be negative")
              if 'temperature' in measurements and abs(measurements['temperature']) > 60:
                  raise ValueError("Temperature out of reasonable range")
          
          def validate_traffic(measurements):
              """Validate traffic measurements"""
              if 'vehicle_count' in measurements and measurements['vehicle_count'] < 0:
                  raise ValueError("Vehicle count cannot be negative")
              if 'avg_speed' in measurements and measurements['avg_speed'] < 0:
                  raise ValueError("Speed cannot be negative")

  # Health Alert Notification Lambda
  HealthAlertFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'smart-city-health-alerts-${Environment}'
      Runtime: python3.9
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          SNS_TOPIC_ARN: !Ref HealthAlertTopic
      Code:
        ZipFile: |
          import json
          import boto3
          import logging
          from datetime import datetime
          
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          
          sns = boto3.client('sns')
          
          def lambda_handler(event, context):
              """
              Process health alerts and send notifications
              """
              try:
                  # Parse S3 event (triggered when new health alerts are created)
                  for record in event['Records']:
                      bucket = record['s3']['bucket']['name']
                      key = record['s3']['object']['key']
                      
                      if 'public-health-alerts' in key:
                          # Read the alert data
                          s3 = boto3.client('s3')
                          response = s3.get_object(Bucket=bucket, Key=key)
                          
                          # Process alert and send notification
                          send_health_alert_notification(key)
                  
                  return {
                      'statusCode': 200,
                      'body': json.dumps('Health alerts processed')
                  }
                  
              except Exception as e:
                  logger.error(f"Error processing health alerts: {str(e)}")
                  raise e
          
          def send_health_alert_notification(alert_key):
              """Send SNS notification for health alerts"""
              message = f"🚨 HEALTH ALERT: New air quality alert detected in {alert_key}"
              
              sns.publish(
                  TopicArn=os.environ['SNS_TOPIC_ARN'],
                  Message=message,
                  Subject='Smart City Health Alert'
              )
              
              logger.info(f"Health alert notification sent for: {alert_key}")

  # SNS Topic for Health Alerts
  HealthAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'smart-city-health-alerts-${Environment}'
      DisplayName: 'Smart City Health Alerts'

Outputs:
  DataValidationFunctionArn:
    Description: 'Data Validation Lambda Function ARN'
    Value: !GetAtt DataValidationFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DataValidationFunction'
  
  HealthAlertFunctionArn:
    Description: 'Health Alert Lambda Function ARN'
    Value: !GetAtt HealthAlertFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-HealthAlertFunction'
  
  HealthAlertTopicArn:
    Description: 'Health Alert SNS Topic ARN'
    Value: !Ref HealthAlertTopic
    Export:
      Name: !Sub '${AWS::StackName}-HealthAlertTopic'
