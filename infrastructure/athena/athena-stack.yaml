AWSTemplateFormatVersion: '2010-09-09'
Description: 'Smart City Athena Resources'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  
  AthenaResultsBucket:
    Type: String
    Description: 'S3 bucket for Athena query results'

Resources:
  # Athena Workgroup
  SmartCityWorkgroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub 'smart-city-${Environment}'
      Description: 'Smart City Analytics Workgroup'
      State: ENABLED
      WorkGroupConfiguration:
        ResultConfiguration:
          OutputLocation: !Sub 's3://${AthenaResultsBucket}/query-results/'
          EncryptionConfiguration:
            EncryptionOption: SSE_S3
        EnforceWorkGroupConfiguration: true
        PublishCloudWatchMetrics: true
        BytesScannedCutoffPerQuery: 1073741824  # 1GB limit
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: SmartCity

  # Named Queries for Common Analytics
  AirQualityQuery:
    Type: AWS::Athena::NamedQuery
    Properties:
      Name: !Sub 'air-quality-hourly-${Environment}'
      Description: 'Hourly air quality analysis'
      Database: !Sub 'smart_city_${Environment}'
      QueryString: |
        SELECT 
          zone,
          hour_timestamp,
          hourly_avg_pm25,
          air_quality_index,
          health_risk_score
        FROM gold_aggregated_air_quality_hourly
        WHERE processing_date >= current_date - interval '7' day
        ORDER BY hour_timestamp DESC, hourly_avg_pm25 DESC
      WorkGroup: !Ref SmartCityWorkgroup

  TrafficAnalysisQuery:
    Type: AWS::Athena::NamedQuery
    Properties:
      Name: !Sub 'traffic-congestion-${Environment}'
      Description: 'Traffic congestion analysis'
      Database: !Sub 'smart_city_${Environment}'
      QueryString: |
        SELECT 
          zone,
          hour_timestamp,
          hourly_avg_vehicles,
          hourly_avg_speed,
          congestion_level,
          traffic_efficiency_score,
          peak_hour_indicator
        FROM gold_aggregated_traffic_hourly
        WHERE processing_date >= current_date - interval '7' day
          AND congestion_level IN ('HIGH', 'SEVERE')
        ORDER BY hour_timestamp DESC, hourly_avg_vehicles DESC
      WorkGroup: !Ref SmartCityWorkgroup

  CorrelationAnalysisQuery:
    Type: AWS::Athena::NamedQuery
    Properties:
      Name: !Sub 'pollution-traffic-correlation-${Environment}'
      Description: 'Pollution and traffic correlation analysis'
      Database: !Sub 'smart_city_${Environment}'
      QueryString: |
        SELECT 
          zone,
          day_date,
          daily_avg_pm25,
          daily_avg_vehicles,
          daily_pollution_traffic_ratio,
          correlation_strength,
          environmental_impact_score
        FROM gold_aggregated_correlations_daily
        WHERE processing_date >= current_date - interval '30' day
          AND correlation_strength != 'MINIMAL'
        ORDER BY environmental_impact_score DESC, day_date DESC
      WorkGroup: !Ref SmartCityWorkgroup

  PublicHealthAlertsQuery:
    Type: AWS::Athena::NamedQuery
    Properties:
      Name: !Sub 'public-health-alerts-${Environment}'
      Description: 'Current public health alerts'
      Database: !Sub 'smart_city_${Environment}'
      QueryString: |
        SELECT 
          zone,
          hour_timestamp,
          hourly_avg_pm25,
          air_quality_index,
          alert_type,
          alert_message
        FROM gold_curated_public_health_alerts
        WHERE hour_timestamp >= current_timestamp - interval '24' hour
        ORDER BY health_risk_score DESC, hour_timestamp DESC
      WorkGroup: !Ref SmartCityWorkgroup

Outputs:
  WorkgroupName:
    Description: 'Athena Workgroup Name'
    Value: !Ref SmartCityWorkgroup
    Export:
      Name: !Sub '${AWS::StackName}-WorkgroupName'
  
  WorkgroupArn:
    Description: 'Athena Workgroup ARN'
    Value: !Sub 'arn:aws:athena:${AWS::Region}:${AWS::AccountId}:workgroup/${SmartCityWorkgroup}'
    Export:
      Name: !Sub '${AWS::StackName}-WorkgroupArn'
