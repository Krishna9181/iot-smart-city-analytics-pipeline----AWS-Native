AWSTemplateFormatVersion: '2010-09-09'
Description: 'Smart City S3 Data Lake'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:
  # Main Data Lake Bucket
  SmartCityDataLake:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'smart-city-datalake-${Environment}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Prefix: 'bronze/'
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
              - TransitionInDays: 90
                StorageClass: GLACIER
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 90
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        CloudWatchConfigurations:
          - Event: s3:ObjectCreated:*
            CloudWatchConfiguration:
              LogGroupName: !Sub '/aws/s3/smart-city-${Environment}'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: SmartCity
        - Key: DataClassification
          Value: Internal

  # Athena Query Results Bucket
  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'smart-city-athena-results-${Environment}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: DeleteQueryResults
            Status: Enabled
            ExpirationInDays: 7
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Glue Scripts Bucket
  GlueScriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'smart-city-glue-scripts-${Environment}-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  DataLakeBucketName:
    Description: 'Main Data Lake S3 Bucket Name'
    Value: !Ref SmartCityDataLake
    Export:
      Name: !Sub '${AWS::StackName}-DataLakeBucket'
  
  DataLakeBucketArn:
    Description: 'Main Data Lake S3 Bucket ARN'
    Value: !GetAtt SmartCityDataLake.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DataLakeBucketArn'
  
  AthenaResultsBucketName:
    Description: 'Athena Results S3 Bucket Name'
    Value: !Ref AthenaResultsBucket
    Export:
      Name: !Sub '${AWS::StackName}-AthenaResultsBucket'
  
  GlueScriptsBucketName:
    Description: 'Glue Scripts S3 Bucket Name'
    Value: !Ref GlueScriptsBucket
    Export:
      Name: !Sub '${AWS::StackName}-GlueScriptsBucket'
